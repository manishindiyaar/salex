name: CI/CD

on:
  pull_request:
    branches:
      - develop
      - staging
      - main
  push:
    branches:
      - develop
      - staging
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      DIRECT_URL: postgresql://ci:ci@localhost:5432/ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check Prisma migration included
        if: github.event_name == 'pull_request'
        run: pnpm db:check-migration -- --ci "${{ github.base_ref }}"

      - name: Validate Prisma schema
        run: pnpm --filter @salex/shared-types exec prisma validate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm type-check

      - name: Test
        run: pnpm exec turbo run test -- --passWithNoTests

      - name: Build
        run: pnpm build

  migrate-non-production:
    name: Migrate Shared Develop/Staging DB
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && (github.ref_name == 'develop' || github.ref_name == 'staging')
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.STAGING_DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply committed Prisma migrations
        run: pnpm db:migrate:deploy

  migrate-production:
    name: Migrate Production DB
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push' && github.ref_name == 'main'
    environment: production
    env:
      DATABASE_URL: ${{ secrets.PRODUCTION_DATABASE_URL }}
      DIRECT_URL: ${{ secrets.PRODUCTION_DIRECT_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 8.15.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Apply committed Prisma migrations
        run: pnpm db:migrate:deploy

  deploy-staging:
    name: Deploy Staging API
    runs-on: ubuntu-latest
    needs: migrate-non-production
    if: github.event_name == 'push' && github.ref_name == 'staging'
    environment: staging
    steps:
      - name: Trigger Railway staging deploy
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_STAGING_TOKEN is not set; failing deploy."
            exit 1
          fi
          npx @railway/cli variable set ALLOWED_ORIGINS=https://salex-admin-dashboard.vercel.app --service salex-api-staging --skip-deploys
          npx @railway/cli redeploy --service salex-api-staging -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_STAGING_TOKEN }}

  deploy-production:
    name: Deploy Production API
    runs-on: ubuntu-latest
    needs: migrate-production
    if: github.event_name == 'push' && github.ref_name == 'main'
    environment: production
    steps:
      - name: Trigger Railway production deploy
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "RAILWAY_PRODUCTION_TOKEN is not set; failing deploy."
            exit 1
          fi
          npx @railway/cli variable set ALLOWED_ORIGINS=https://salex-admin-dashboard.vercel.app --service salex-api-production --skip-deploys
          npx @railway/cli redeploy --service salex-api-production -y
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_PRODUCTION_TOKEN }}
